[build]
builder = "railpack"
watchPatterns = [
  "railway.toml",
  "Procfile",
  "requirements.txt",
  "nemotron/scripts/**",
  "backend/scripts/**",
  "autoresearch/data/**",
  "frontend/**",
  "docs/**"
]

[deploy]
startCommand = "python3 nemotron/scripts/nemotron_coordinator.py"
restartPolicyType = "on_failure"
